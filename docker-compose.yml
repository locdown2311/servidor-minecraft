version: '3.8'

services:
  # ================================
  # Aplicação Laravel (PHP + Apache + Worker + Scheduler)
  # ================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mchost_app
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    volumes:
      # Docker socket do HOST montado para gerenciar containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Dados dos servidores Minecraft
      - /mnt/docker_data/servidor_mine:/mnt/docker_data/servidor_mine
      # Storage persistente
      - app_storage:/var/www/html/storage
    ports:
      - "80:80"
    depends_on:
      - mysql
      - redis
    networks:
      - mchost

  # ================================
  # MySQL
  # ================================
  mysql:
    image: mysql:8.0
    container_name: mchost_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: mchost
      MYSQL_USER: mchost
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-rootsecret}"
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - mchost

  # ================================
  # Redis (Filas + Cache)
  # ================================
  redis:
    image: redis:7-alpine
    container_name: mchost_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - mchost

volumes:
  mysql_data:
  app_storage:

networks:
  mchost:
    driver: bridge
