version: '3.8'

services:
  # ================================
  # Aplicação Laravel (PHP + Apache + Worker + Scheduler)
  # ================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mchost_app
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=mchost
      - DB_USERNAME=mchost
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - DOCKER_API_HOST=${DOCKER_API_HOST:-http://localhost}
      - DOCKER_SOCKET=${DOCKER_SOCKET:-/var/run/docker.sock}
      - MINECRAFT_HOST_DATA_PATH=${MINECRAFT_HOST_DATA_PATH:-/mnt/docker_data/servidor_mine}
      - MINECRAFT_CONTAINER_PATH=${MINECRAFT_CONTAINER_PATH:-/data}
    volumes:
      # Docker socket do HOST montado para gerenciar containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Storage persistente do Laravel (No disco local)
      - ./storage:/var/www/html/storage
    ports:
      - "85:80"
    depends_on:
      - mysql
    networks:
      - mchost

  # ================================
  # MySQL
  # ================================
  mysql:
    image: mysql:8.0
    container_name: mchost_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: mchost
      MYSQL_USER: mchost
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-rootsecret}"
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - mchost

volumes:
  mysql_data:

networks:
  mchost:
    driver: bridge
